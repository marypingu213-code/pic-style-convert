<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿雷 (A-Lei) 風格轉換器</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .ph-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-[#f5f1e7] text-gray-800 font-sans min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [images, setImages] = React.useState([]);
      const [isProcessing, setIsProcessing] = React.useState(false);
      const [apiKey, setApiKey] = React.useState(''); // ✅ 用來儲存使用者介面輸入的金鑰
      const fileInputRef = React.useRef(null);

      // 處理檔案上傳
      const handleFileChange = (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        const newImages = files.map((file) => ({
          id: Math.random().toString(36).substring(2, 9),
          file,
          originalUrl: URL.createObjectURL(file),
          status: 'pending', // pending, processing, done, error
          resultBase64: null,
          errorMessage: ''
        }));

        setImages((prev) => [...prev, ...newImages]);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      // 移除圖片
      const removeImage = (id) => {
        setImages((prev) => prev.filter((img) => img.id !== id));
      };

      // 讀取檔案為 Base64
      const fileToBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      // 具備指數退避的 Fetch 函數
      const fetchWithBackoff = async (url, options, retries = 5) => {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i <= retries; i++) {
          try {
            const response = await fetch(url, options);
            if (!response.ok) {
              const errorData = await response.json().catch(() => ({}));
              const errText = errorData?.error?.message || await response.text();
              throw new Error(`API 錯誤: ${errText}`);
            }
            return await response.json();
          } catch (error) {
            if (i === retries) throw error;
            await new Promise((res) => setTimeout(res, delays[i]));
          }
        }
      };

      // 呼叫 Gemini API 進行風格轉換
      const processSingleImage = async (imageObj) => {
        // ✅ 抓取畫面中輸入的金鑰
        const currentKey = apiKey.trim();
        if (!currentKey) {
          throw new Error("請先在上方輸入 Gemini API Key");
        }

        try {
          const base64Data = await fileToBase64(imageObj.file);
          const mimeType = imageObj.file.type;
          
          // ✅ 使用支援圖片生成的 gemini-2.5-flash-image-preview 模型
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${currentKey}`;
          
          const prompt = `
            Transform this photo into an illustration. Use a very specific Taiwanese indie illustration style (similar to A-Lei):
            1. Bold Outlines: Use thick, uniform, solid black outlines for all characters and objects.
            2. Flat Colors: Use completely flat, solid colors. ABSOLUTELY NO gradients, NO shadows, and NO realistic lighting.
            3. Minimalist Faces: Facial features must be extremely simple: just two tiny black dots for eyes, and a simple short line or curve for the mouth. No detailed noses or detailed eyes.
            4. Color Palette: Use a warm, slightly muted, retro earthy color palette (mustard yellow, olive green, terracotta, denim blue).
            5. Vibe: Keep the composition of the original photo but simplify all clothing and background details into basic geometric blocks enclosed by thick black lines. Make it feel cozy, everyday, and heartwarming.
          `;

          const payload = {
            contents: [{
              role: "user",
              parts: [
                { text: prompt },
                { inlineData: { mimeType: mimeType, data: base64Data } }
              ]
            }],
            // ✅ 確保設定允許圖片輸出
            generationConfig: { responseModalities: ["TEXT", "IMAGE"] }
          };

          const result = await fetchWithBackoff(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const outBase64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
          
          if (!outBase64) throw new Error("API 未回傳圖片資料，請稍後再試或確認您的 API Key。");
          return `data:image/jpeg;base64,${outBase64}`;

        } catch (error) {
          console.error("處理錯誤:", error);
          throw new Error(error.message || "轉換失敗");
        }
      };

      // 開始批次處理
      const startBatchProcessing = async () => {
        if (!apiKey.trim()) {
          alert("請先在上方輸入您的 Gemini API Key！");
          return;
        }

        setIsProcessing(true);

        for (let i = 0; i < images.length; i++) {
          if (images[i].status === 'pending' || images[i].status === 'error') {
            setImages((prev) => prev.map((img, index) => index === i ? { ...img, status: 'processing', errorMessage: '' } : img));
            try {
              const resultUrl = await processSingleImage(images[i]);
              setImages((prev) => prev.map((img, index) => index === i ? { ...img, status: 'done', resultBase64: resultUrl } : img));
            } catch (error) {
              setImages((prev) => prev.map((img, index) => index === i ? { ...img, status: 'error', errorMessage: error.message } : img));
            }
          }
        }
        setIsProcessing(false);
      };

      // 單張下載
      const downloadImage = (url, filename) => {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // 批次下載
      const downloadAll = () => {
        const doneImages = images.filter(img => img.status === 'done');
        doneImages.forEach((img, index) => {
          setTimeout(() => downloadImage(img.resultBase64, `alei_style_${index + 1}.jpg`), index * 400);
        });
      };

      const pendingCount = images.filter(img => img.status === 'pending').length;
      const doneCount = images.filter(img => img.status === 'done').length;

      return (
        <div className="p-6">
          <div className="max-w-5xl mx-auto space-y-8">
            
            {/* 標題與設定區 */}
            <div className="text-center space-y-6">
              <h1 className="text-4xl font-bold tracking-wider text-gray-900 mt-8">
                阿雷 (A-Lei) 風格轉換器
              </h1>
              <p className="text-gray-600 max-w-2xl mx-auto">
                上傳照片，AI 將運用粗線條、平塗色彩與極簡五官的美學，為您生成充滿溫度的生活插畫。
              </p>
            </div>

            {/* API 金鑰輸入區塊 (上網安全版) */}
            <div className="bg-white p-5 rounded-xl shadow-sm border border-orange-200">
              <label className="block text-sm font-bold text-gray-700 mb-2">
                <i className="ph ph-key text-orange-500 mr-1"></i> 請輸入您的 Gemini API Key：
              </label>
              <input 
                type="password" 
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                placeholder="在此貼上您的 AIzaSy... 金鑰"
                className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-orange-300 outline-none"
              />
              <p className="text-xs text-gray-400 mt-2">
                💡 您的金鑰只會存放在當前瀏覽器中，重整網頁即會消失，不會外洩，請安心使用。
              </p>
            </div>

            {/* 上傳區塊 */}
            <div 
              className="border-4 border-dashed border-gray-300 rounded-2xl p-10 bg-white/50 hover:bg-white transition-colors cursor-pointer flex flex-col items-center justify-center text-center shadow-sm"
              onClick={() => fileInputRef.current?.click()}
            >
              <i className="ph ph-cloud-arrow-up text-6xl text-gray-400 mb-4"></i>
              <h3 className="text-xl font-semibold mb-2">點擊或拖曳照片至此</h3>
              <p className="text-sm text-gray-500">支援 JPG, PNG，可一次選取多張</p>
              <input 
                type="file" ref={fileInputRef} onChange={handleFileChange} 
                multiple accept="image/jpeg, image/png, image/webp" className="hidden" 
              />
            </div>

            {/* 控制列 */}
            {images.length > 0 && (
              <div className="flex flex-wrap items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-gray-100 sticky top-4 z-10">
                <div className="flex space-x-4 text-sm font-medium mb-4 sm:mb-0">
                  <span className="text-gray-600">總計: {images.length}</span>
                  <span className="text-blue-600">等待中: {pendingCount}</span>
                  <span className="text-green-600">已完成: {doneCount}</span>
                </div>
                
                <div className="flex space-x-3 w-full sm:w-auto">
                  <button 
                    onClick={startBatchProcessing}
                    disabled={isProcessing || pendingCount === 0}
                    className={`flex-1 sm:flex-none flex items-center justify-center px-5 py-2.5 rounded-lg font-bold transition-all ${
                      isProcessing || pendingCount === 0 
                        ? 'bg-gray-200 text-gray-400 cursor-not-allowed' 
                        : 'bg-black text-white hover:bg-gray-800 shadow-md'
                    }`}
                  >
                    {isProcessing ? (
                      <><i className="ph ph-spinner ph-spin text-lg mr-2"></i> 處理中...</>
                    ) : (
                      <><i className="ph ph-play text-lg mr-2"></i> 開始批次轉換</>
                    )}
                  </button>

                  {doneCount > 0 && (
                    <button 
                      onClick={downloadAll}
                      className="flex-1 sm:flex-none flex items-center justify-center px-5 py-2.5 rounded-lg font-bold bg-[#d17a45] text-white hover:bg-[#b86735] transition-all shadow-md"
                    >
                      <i className="ph ph-download-simple text-lg mr-2"></i> 下載全部
                    </button>
                  )}
                </div>
              </div>
            )}

            {/* 圖片顯示區塊 */}
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {images.map((img) => (
                <div key={img.id} className="bg-white rounded-xl p-4 shadow-sm border relative flex flex-col">
                  {/* 刪除按鈕 */}
                  <button 
                    onClick={() => removeImage(img.id)}
                    className="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 hover:bg-red-600 z-10"
                    title="移除圖片"
                  >
                    <i className="ph ph-x text-sm"></i>
                  </button>

                  <div className="grid grid-cols-2 gap-2 flex-grow">
                    {/* 原圖 */}
                    <div className="flex flex-col">
                      <span className="text-xs text-gray-500 mb-1 text-center">原圖</span>
                      <img src={img.originalUrl} alt="Original" className="w-full h-32 object-cover rounded-lg bg-gray-100" />
                    </div>

                    {/* 結果圖或狀態 */}
                    <div className="flex flex-col">
                      <span className="text-xs text-gray-500 mb-1 text-center">轉換結果</span>
                      <div className="w-full h-32 rounded-lg bg-gray-50 border flex items-center justify-center overflow-hidden">
                        {img.status === 'pending' && <span className="text-gray-400 text-sm">等待中...</span>}
                        {img.status === 'processing' && <i className="ph ph-spinner ph-spin text-2xl text-blue-500"></i>}
                        {img.status === 'done' && <img src={img.resultBase64} alt="Result" className="w-full h-full object-cover" />}
                        {img.status === 'error' && (
                          <div className="text-red-500 text-xs text-center p-2">
                            <i className="ph ph-warning-circle text-xl mb-1 block"></i>
                            轉換失敗
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  {/* 錯誤訊息提示 */}
                  {img.status === 'error' && (
                    <div className="mt-3 text-xs text-red-600 bg-red-50 p-2 rounded">
                      {img.errorMessage}
                    </div>
                  )}

                  {/* 單張下載按鈕 */}
                  {img.status === 'done' && (
                    <button 
                      onClick={() => downloadImage(img.resultBase64, `alei_${img.id}.jpg`)}
                      className="mt-4 w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-800 rounded-lg text-sm font-semibold flex justify-center items-center"
                    >
                      <i className="ph ph-download-simple mr-2"></i> 下載此圖片
                    </button>
                  )}
                </div>
              ))}
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
